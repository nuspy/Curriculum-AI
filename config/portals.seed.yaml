# Seed del registro portali (tabella `portals`). Caricato da config/loader.py:load_portals_seed().
#   automation_policy: auto | semi | manual | read_only
#   tos_risk:          low | med | high | extreme
- name: LinkedIn Jobs
  slug: linkedin
  base_url: https://www.linkedin.com/jobs/
  adapter_key: linkedin
  search_url_template: "https://www.linkedin.com/jobs/search/?keywords={keywords}&location={location}"
  requires_account: true
  automation_policy: semi
  tos_risk: extreme
  enabled: true
- name: Indeed
  slug: indeed
  base_url: https://www.indeed.com/
  adapter_key: indeed
  search_url_template: "https://www.indeed.com/jobs?q={keywords}&l={location}"
  requires_account: false
  automation_policy: semi
  tos_risk: high
  enabled: true
